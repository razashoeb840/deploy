<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>MediPulse - Login Portal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6;
        }

        /* Split-screen container */
        .login-container {
            display: flex;
            height: 100vh;
        }

        /* Left Side: Banner */
        .login-left {
            flex: 1;
            background-image: linear-gradient(135deg, rgba(8, 55, 81, 0.8), rgba(1, 202, 139, 0.4)), url('login_bg.png');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .login-left::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.2);
        }

        .login-left-content {
            text-align: left;
            max-width: 600px;
            position: relative;
            z-index: 2;
        }

        .login-left-content h1 {
            font-size: 60px;
            color: #ffffff;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.1;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            letter-spacing: -1px;
        }

        .login-left-content h1 span {
            color: #01ca8b;
        }

        .login-left-content p {
            color: #e1f3ff;
            font-size: 18px;
            font-weight: 400;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        /* Right Side: Form */
        .login-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            padding: 40px;
        }

        .login-box {
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06);
            border-radius: 24px;
            background: white;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .login-box h2 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .login-box p {
            text-align: center;
            color: #64748b;
            margin-bottom: 35px;
            font-size: 15px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 15px 16px 15px 45px;
            border: 2px solid transparent;
            border-radius: 14px;
            font-size: 15px;
            background: #f8fafc;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            color: #0f172a;
        }

        .form-group input:focus, .form-group select:focus {
            background: white;
            border-color: #01ca8b;
            box-shadow: 0 10px 25px rgba(1, 202, 139, 0.1);
        }

        .form-group i {
            position: absolute;
            left: 16px;
            top: 42px;
            color: #94a3b8;
            font-size: 18px;
            transition: 0.3s;
        }
        
        .form-group input:focus ~ i, .form-group select:focus ~ i {
            color: #01ca8b;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #01ca8b, #059669);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 10px 25px rgba(1, 202, 139, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(1, 202, 139, 0.4);
            background: linear-gradient(135deg, #059669, #047857);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-link:hover {
            color: #01ca8b;
        }

        /* Responsive */
        @media(max-width: 900px) {
            .login-container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }
            .login-left {
                padding: 40px 20px;
                text-align: center;
                justify-content: center;
            }
            .login-left-content {
                text-align: center;
            }
            .login-left-content h1 {
                font-size: 40px;
            }
            .login-left-content p {
                font-size: 16px;
                margin-bottom: 0;
            }
            .login-right {
                padding: 30px 20px;
            }
            .login-box {
                padding: 30px 20px;
            }
        }
        
        @media(max-width: 480px) {
            .login-left-content h1 { font-size: 32px; }
            .login-box h2 { font-size: 28px; }
            .login-box p { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <!-- Background Banner Section -->
        <div class="login-left">
            <div class="login-left-content">
                <h1>Login to<br><i class="fas fa-heartbeat"></i> Medi<span>Pulse</span></h1>
                <p>Secure authentication portal for Healthcare Professionals. Please log in to securely access your hospital modules.</p>
            </div>
        </div>

        <!-- Login Form Section -->
        <div class="login-right">
            <div class="login-box">
                <h2>Sign In</h2>
                <p>Select your role to access your dashboard</p>

                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Account Role</label>
                        <i class="fas fa-user-tag"></i>
                        <select id="roleInput" required>
                            <option value="">Select Role</option>
                            <option value="admin">Hospital Administrator</option>
                            <option value="doctor">Doctor</option>
                            <option value="receptionist">Receptionist</option>
                            <option value="pharmacy">Pharmacy / Inventory</option>
                            <option value="guest">Guest (Full Testing Access)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Unique ID</label>
                        <i class="fas fa-id-badge"></i>
                        <input type="text" id="idInput" placeholder="Enter your ID (e.g. DOC-123)" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <i class="fas fa-lock"></i>
                        <input type="password" id="passInput" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn-login">Secure Login <i class="fas fa-arrow-right" style="margin-left: 5px;"></i></button>
                    
                    <a href="1index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
                </form>

            </div>
        </div>

    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault(); // Prevent form reload
            
            const role = document.getElementById('roleInput').value;
            const uid = document.getElementById('idInput').value.trim();
            const pass = document.getElementById('passInput').value;

            // Guest validation
            if (role === 'guest') {
                localStorage.setItem('userRole', role);
                localStorage.setItem('userName', 'GUEST');
                window.location.href = '1index.html';
                return;
            }

            // Normal user validation
            if(!role || !uid || !pass) {
                alert("Please fill out all credentials.");
                return;
            }

            const btn = document.querySelector('.btn-login');
            btn.innerHTML = 'Authenticating... <i class="fas fa-spinner fa-spin"></i>';
            btn.style.opacity = '0.8';

            // Verify UID with backend
            try {
                const res = await fetch('/api/admin/staff');
                const staffList = await res.json();
                
                const cleanUid = uid.replace(/-/g, '').toLowerCase();
                const matchedUser = staffList.find(s => {
                    const cleanId = (s.id || '').replace(/-/g, '').toLowerCase();
                    return cleanId === cleanUid;
                });
                
                let roleMatch = false;
                if (matchedUser) {
                    const userRole = (matchedUser.role || '').toLowerCase();
                    if (role === 'doctor' && userRole.includes('doctor')) roleMatch = true;
                    else if (role === 'admin' && userRole.includes('admin')) roleMatch = true;
                    else if (role === 'receptionist' && userRole.includes('receptionist')) roleMatch = true;
                    else if (role === 'pharmacy' && userRole.includes('pharmacy')) roleMatch = true;
                }
                
                if (!matchedUser || !roleMatch) {
                    alert(`Authentication Failed: No registered ${role} found with ID '${uid}'`);
                    btn.innerHTML = 'Secure Login <i class="fas fa-arrow-right"></i>';
                    btn.style.opacity = '1';
                    return;
                }
            } catch(e) {
                console.error('Validation error:', e);
                alert("Unable to verify credentials with server.");
                btn.innerHTML = 'Secure Login <i class="fas fa-arrow-right"></i>';
                btn.style.opacity = '1';
                return;
            }

            localStorage.setItem('userRole', role);
            localStorage.setItem('userName', uid);

            switch(role) {
                case 'admin':
                    window.location.href = '9admin_dashboard.html';
                    break;
                case 'doctor':
                    window.location.href = '3doctor_module2.html';
                    break;
                case 'receptionist':
                    window.location.href = '2patient.html';
                    break;
                case 'pharmacy':
                    window.location.href = '5medicine.html';
                    break;
                default:
                    alert('Unknown role routing.');
                    btn.innerHTML = 'Secure Login <i class="fas fa-arrow-right"></i>';
                    btn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
